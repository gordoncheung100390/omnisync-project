<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOUR FROM HOME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* This forces the image to be the background layer */
        .bg-test {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        .content {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.5); /* Tint */
            text-align: center;
        }

        h1 { font-weight: 200; letter-spacing: 15px; text-transform: uppercase; margin: 0; }
        .btn {
            margin-top: 50px; padding: 20px 60px;
            border: 1px solid #fff; color: #fff;
            text-decoration: none; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <img src="logo.png" class="bg-test" alt="background">

    <div class="content">
        <h1>Tour From Home</h1>
        <div style="display: flex; gap: 20px;">
            <a href="Tour.html" class="btn">Host</a>
            <a href="Tourist.html" class="btn">Join</a>
        </div>
    </div>

</body>
</html>
