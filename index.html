<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOUR FROM HOME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #fff; font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* THE BACKGROUND LAYER */
        #earth-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Using the dot-slash prefix to force local pathing */
            background-image: url('./background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* OVERLAY FOR CONTRAST */
        #overlay-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .main-ui {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        /* COMPASS LOGO (Confirmed working) */
        .compass {
            width: 80px; height: 80px;
            background-image: url('./logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 30px;
        }

        h1 { font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 200; letter-spacing: 15px; text-transform: uppercase; margin: 0; }
        p { font-size: 0.8rem; letter-spacing: 5px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin: 15px 0 60px 0; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 300px; }
        .btn { padding: 18px 0; font-size: 0.75rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.5); transition: 0.3s; }
        .btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="earth-layer"></div>
    <div id="overlay-layer"></div>

    <div class="main-ui">
        <div class="compass"></div>
        <h1>Tour From Home</h1>
        <p>Explore the world in real-time</p>
        <div class="btn-group">
            <a href="Tour.html" class="btn">Host a Tour</a>
            <a href="Tourist.html" class="btn">Join a Mission</a>
        </div>
    </div>

</body>
</html>
