<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNISYNC | VIRTUAL TOURS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .lobby-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        h1 span { color: #FFD700; }

        p { color: #888; margin-bottom: 40px; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* THE GUIDE (Master Console) */
        .btn-guide {
            background: #FFD700;
            color: #000;
        }

        .btn-guide:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        /* THE TOURIST (Viewer) */
        .btn-tourist {
            background: transparent;
            color: #FFD700;
            border: 2px solid #FFD700;
        }

        .btn-tourist:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-3px);
        }

        .note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="lobby-card">
        <h1>OMNI<span>SYNC</span></h1>
        <p>Real-time street level exploration</p>

        <div class="btn-group">
            <a href="tour.html" class="btn btn-guide">Start as Guide (Host)</a>
            <a href="tourist.html" class="btn btn-tourist">Join as Tourist (Guest)</a>
        </div>

        <div class="note">
            Starting as a Guide will automatically reset the session chat history.
        </div>
    </div>

</body>
</html>
