<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOUR FROM HOME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* BACKGROUND WITH YOUR LOGO */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* This gradient ensures the bottom is dark for the buttons and the logo shows through the top */
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), url('logo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        /* MAIN HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 200;
            letter-spacing: 15px; /* Ultra-wide Starlink spacing */
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        /* ACTION BUTTONS */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            position: relative;
            padding: 20px 0;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            border: 2px solid #fff;
            background: transparent;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            text-align: center;
        }

        /* THE STARLINK HOVER EFFECT */
        .btn:hover {
            background-color: #fff;
            color: #000;
            transform: translateY(-2px);
        }

        /* FOOTER DETAILS */
        .footer-note {
            position: absolute;
            bottom: 30px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="hero">
        <h1>Tour From Home</h1>
        <p>Global Remote Exploration</p>

        <div class="btn-group">
            <a href="Tour.html" class="btn">Start Mission (Guide)</a>
            <a href="Tourist.html" class="btn">Join Mission (Guest)</a>
        </div>

        <div class="footer-note">
            Orbital Sync Active // OmniSync System 1.0
        </div>
    </div>

</body>
</html>
