<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOUR FROM HOME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* BACKGROUND IMAGE WITH STARLINK-STYLE TINT */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%), url('logo.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* MAIN CONTENT AREA */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 200;
            letter-spacing: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: #ccc;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* STARLINK BUTTON STYLE */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            position: relative;
            padding: 15px 40px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            border: 2px solid #fff;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }

        .btn:hover {
            background-color: #fff;
            color: #000;
        }

        .btn-primary {
            background-color: transparent;
        }

        /* FOOTER NOTE */
        .footer-note {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="hero">
        <h1>Tour From Home</h1>
        <p>Explore the world in real-time</p>

        <div class="btn-group">
            <a href="Tour.html" class="btn">Host a Tour</a>
            <a href="Tourist.html" class="btn">Join a Mission</a>
        </div>

        <div class="footer-note">
            Syncing with Global Satellites...
        </div>
    </div>

</body>
</html>
