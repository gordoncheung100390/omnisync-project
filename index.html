<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | LOBBY</title>
    <style>
        body { 
            margin: 0;
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            /* BACKGROUND IMAGE LOGIC */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('logo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Inter', sans-serif;
        }

        .box { 
            text-align: center; 
            border: 1px solid rgba(255, 215, 0, 0.3); 
            padding: 50px; 
            border-radius: 24px; 
            background: rgba(0, 0, 0, 0.8); /* Dark overlay for readability */
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h1 { color: #FFD700; margin-bottom: 30px; letter-spacing: 2px; font-size: 2.5rem; }

        .btn { 
            display: block; width: 250px; padding: 18px; margin: 15px auto; 
            text-decoration: none; font-weight: bold; border-radius: 12px; transition: 0.3s;
            text-transform: uppercase;
        }

        .guide-btn { background: #FFD700; color: black; }
        .tourist-btn { border: 2px solid #FFD700; color: #FFD700; }
        
        .guide-btn:hover { background: white; transform: scale(1.05); }
        .tourist-btn:hover { background: rgba(255,215,0,0.1); transform: scale(1.05); }
        
        .note { color: #888; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>OMNISYNC</h1>
        <a href="Tour.html" class="btn guide-btn">Open Guide Console</a>
        <a href="Tourist.html" class="btn tourist-btn">Open Tourist View</a>
        <p class="note">GUIDE CONSOLE resets the session history.</p>
    </div>

</body>
</html>
