<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOUR FROM HOME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff; overflow: hidden;
        }

        /* LAYER 1: THE BACKGROUND (Using your working logo.png) */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('logo.png'); /* This is the line that makes it work */
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* LAYER 2: CINEMATIC OVERLAY */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Darkens the logo so the white text is easy to read */
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* CONTENT CONTAINER */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 200;
            letter-spacing: 15px; /* Starlink Style spacing */
            text-transform: uppercase;
            margin: 0;
        }

        p {
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            margin: 15px 0 60px 0;
        }

        /* STARLINK BUTTONS */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            padding: 20px 0;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            border: 1px solid #fff;
            transition: all 0.4s ease;
            text-align: center;
        }

        .btn:hover {
            background-color: #fff;
            color: #000;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="overlay"></div>

    <div class="hero">
        <h1>Tour From Home</h1>
        <p>Global Remote Exploration</p>

        <div class="btn-group">
            <a href="Tour.html" class="btn">Host a Tour</a>
            <a href="Tourist.html" class="btn">Join a Mission</a>
        </div>

        <div class="footer">Orbital Sync Active // OmniSync 1.0</div>
    </div>

</body>
</html>
