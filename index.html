<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOUR FROM HOME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000; /* Fallback if image fails */
            color: #fff; overflow: hidden;
        }

        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* BRUTAL FORCE LOGO CHECK */
            background-image: url('logo.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: rgba(0,0,0,0.4); /* Subtle tint to see text over logo */
        }

        .hero h1 {
            font-size: clamp(2rem, 7vw, 4rem);
            font-weight: 200; letter-spacing: 15px;
            margin-bottom: 5px; text-transform: uppercase;
        }

        .hero p {
            font-size: 0.9rem; letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 60px; text-transform: uppercase;
        }

        .btn-group { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 320px; }

        .btn {
            padding: 20px 0; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            text-decoration: none; color: #fff;
            border: 2px solid #fff; transition: 0.4s;
            text-align: center;
        }

        .btn:hover { background-color: #fff; color: #000; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="hero">
        <h1>Tour From Home</h1>
        <p>Global Remote Exploration</p>
        <div class="btn-group">
            <a href="Tour.html" class="btn">Start Mission (Guide)</a>
            <a href="Tourist.html" class="btn">Join Mission (Guest)</a>
        </div>
    </div>
</body>
</html>
