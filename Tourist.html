<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        #container { display: flex; height: 100vh; width: 100vw; }
        #street-view { flex: 1; background: #000; }
        #map-2d { width: 30%; background: #1a1a1a; border-left: 1px solid #444; }
        #resizer { width: 6px; background: #222; cursor: col-resize; z-index: 10; }
        #resizer:hover { background: #00E5FF; }

        #name-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #name-box { background: #111; padding: 40px; border: 1px solid #333; text-align: center; border-radius: 4px; }
        input { padding: 12px; background: #000; border: 1px solid #fff; color: #fff; margin-bottom: 20px; width: 250px; font-family: inherit; }
        
        #guide-video-container { position: absolute; top: 20px; right: 20px; width: 220px; aspect-ratio: 16/9; border: 2px solid #fff; z-index: 1000; background: #000; overflow: hidden; }
        /* FIXED: Object-fit for better mobile viewing */
        #guide-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        #chat-container { position: absolute; bottom: 100px; left: 20px; width: 250px; height: 180px; background: rgba(0,0,0,0.8); border: 1px solid #333; display: flex; flex-direction: column; z-index: 2000; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; }
        
        #overlay-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; gap: 15px; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid #444; border-radius: 4px; align-items: center; white-space: nowrap; }
        .btn { background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        #guide-status { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 5px #ff4444; transition: all 0.3s ease; }
        #guide-status.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div id="name-overlay">
        <div id="name-box">
            <h2>INITIALIZE CALLSIGN</h2>
            <input type="text" id="name-in" placeholder="Enter Name..."><br>
            <button class="btn" onclick="startSession()">Enter Mission</button>
        </div>
    </div>

    <div id="guide-video-container">
        <video id="guide-video" autoplay playsinline webkit-playsinline muted></video>
    </div>
    
    <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="chat-msg" placeholder="Type message..." style="background:transparent;border:none;border-top:1px solid #333;color:#fff;padding:8px;" onkeypress="if(event.key==='Enter') sendChat()">
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <div id="guide-status"></div>
        <span style="font-size:10px; font-weight:700;">GUIDE STATUS</span>
        <button class="btn" id="tether-btn" onclick="toggleTether()">Untether</button>
        <button class="btn" onclick="joinLive()" style="background:#00E5FF">Sync Senses</button>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places&callback=initApp" async defer></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = "T_" + Math.floor(Math.random()*9999);
        let userName, panorama, map, guideMarker, touristSelfMarker, isTethered = true, pc;

        function startSession() {
            userName = document.getElementById("name-in").value.trim() || "Guest";
            document.getElementById("name-overlay").remove();
        }

        async function initApp() {
            const startPos = { lat: 40.75, lng: -73.98 };
            panorama = new google.maps.StreetViewPanorama(document.getElementById("street-view"), { 
                position: startPos, visible: true, addressControl: false, clickToGo: true
            });

            map = new google.maps.Map(document.getElementById("map-2d"), { 
                center: startPos, zoom: 17, streetViewControl: false 
            });
            map.setStreetView(panorama);

            guideMarker = new google.maps.Marker({ 
                position: startPos, map: map, 
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#F00", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2, rotation: 0 },
                zIndex: 1000
            });

            touristSelfMarker = new google.maps.Marker({
                position: startPos, map: map,
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#FFD700", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2, rotation: 0 },
                zIndex: 500
            });

            const resizer = document.getElementById("resizer");
            let isResizing = false;
            resizer.addEventListener("mousedown", () => isResizing = true);
            window.addEventListener("mousemove", (e) => { 
                if (isResizing) { 
                    document.getElementById("map-2d").style.width = (window.innerWidth - e.clientX) + "px"; 
                    google.maps.event.trigger(map, "resize"); 
                }
            });
            window.addEventListener("mouseup", () => isResizing = false);

            panorama.addListener("position_changed", () => {
                const currentPos = panorama.getPosition();
                touristSelfMarker.setPosition(currentPos);
                db.ref("tour/tourists/" + myId).update({ name: userName, lat: currentPos.lat(), lng: currentPos.lng() });
            });

            panorama.addListener("pov_changed", () => {
                const pov = panorama.getPov();
                let icon = touristSelfMarker.getIcon();
                icon.rotation = pov.heading;
                touristSelfMarker.setIcon(icon);
            });

            db.ref("tour/guide").on("value", snap => {
                const data = snap.val();
                const statusDot = document.getElementById("guide-status");
                if(!data || !data.position) { statusDot.classList.remove("online"); return; }
                statusDot.classList.add("online");
                const guideLatLng = new google.maps.LatLng(data.position.lat, data.position.lng);
                guideMarker.setPosition(guideLatLng);
                if(data.pov && data.pov.heading !== undefined) {
                    let icon = guideMarker.getIcon();
                    icon.rotation = data.pov.heading;
                    guideMarker.setIcon(icon);
                }
                if(isTethered) {
                    panorama.setPosition(guideLatLng);
                    if(data.pov) panorama.setPov(data.pov);
                    map.panTo(guideLatLng);
                }
            });
        }

        async function joinLive() {
            const video = document.getElementById("guide-video");
            
            // MOBILE FIX: "Wake up" the video element immediately on click
            video.play().catch(() => {});
            video.muted = false; 

            if(pc) pc.close();
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

            pc.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    video.srcObject = event.streams[0];
                    // Final attempt to play; if audio is blocked, stay muted
                    video.play().catch(() => {
                        video.muted = true;
                        video.play();
                    });
                }
            };

            // Use .on() to handle Guide restarts/re-offers
            db.ref("calls/active/offer").on("value", async (snap) => {
                const offer = snap.val();
                if (offer && pc.signalingState !== "stable") {
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    await db.ref("calls/active/answer").set({ type: answer.type, sdp: answer.sdp });
                }
            });

            db.ref("calls/active/guideCandidates").on("child_added", (snap) => {
                if (snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(() => {});
            });
        }

        function toggleTether() {
            isTethered = !isTethered;
            document.getElementById("tether-btn").innerText = isTethered ? "Untether" : "Tether Me";
        }

        function sendChat() {
            const el = document.getElementById("chat-msg");
            if(el.value.trim()) db.ref("chat").push({ sender: userName.toUpperCase(), text: el.value });
            el.value = "";
        }

        db.ref("chat").on("child_added", snap => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        });

        window.onbeforeunload = () => db.ref("tour/tourists/" + myId).remove();
    </script>
</body>
</html>
