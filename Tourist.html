<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        #main-layout { display: flex; height: 100vh; width: 100vw; }
        #street-view { flex: 1; }
        #map-2d { width: 30%; background: #1a1a1a; border-left: 1px solid #333; }
        #resizer { width: 12px; cursor: col-resize; background: #222; z-index: 10; }
        #resizer:hover { background: #FFD700; }
        #vid-box { position: absolute; top: 20px; right: 20px; width: 240px; aspect-ratio: 16/9; background: #000; border: 2px solid #FFD700; border-radius: 12px; z-index: 1000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 50px; border: 1px solid #FFD700; }
        button { background: #FFD700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vid-box"><video id="remoteVideo" autoplay playsinline></video></div>
    <div id="main-layout">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>
    <div id="controls"><button id="joinBtn" onclick="joinVideo()">JOIN LIVE TOUR</button></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs", v: "weekly"
        });

        let panorama, map, pc;

        async function init() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
            panorama = new StreetViewPanorama(document.getElementById("street-view"), { position: { lat: 40.7580, lng: -73.9855 }, visible: true });
            map = new Map(document.getElementById("map-2d"), { center: { lat: 40.7580, lng: -73.9855 }, zoom: 17 });
            db.ref("tour/guide").on("value", s => {
                if(s.val()) { panorama.setPosition(s.val().position); panorama.setPov(s.val().pov); map.setCenter(s.val().position); }
            });
        }

        // RESIZER
        const resizer = document.getElementById("resizer");
        const rightSide = document.getElementById("map-2d");
        let isResizing = false;
        resizer.addEventListener("mousedown", () => isResizing = true);
        window.addEventListener("mousemove", (e) => { if(isResizing) rightSide.style.width = (window.innerWidth - e.clientX) + "px"; });
        window.addEventListener("mouseup", () => isResizing = false);

        async function joinVideo() {
            const vid = document.getElementById('remoteVideo');
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            
            // This event fires when the stream finally arrives
            pc.ontrack = e => { vid.srcObject = e.streams[0]; vid.play(); };

            // Send my info to the guide
            pc.onicecandidate = e => e.candidate && db.ref("calls/active/touristCandidates").push(e.candidate.toJSON());
            
            // Listen for guide's connection info
            db.ref("calls/active/guideCandidates").on("child_added", s => s.val() && pc.addIceCandidate(new RTCIceCandidate(s.val())));
            
            // Get the offer and answer it
            db.ref("calls/active/offer").once("value", async s => {
                if(s.val()){
                    await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref("calls/active/answer").set({ type: ans.type, sdp: ans.sdp });
                }
            });
        }
        init();
    </script>
</body>
</html>
