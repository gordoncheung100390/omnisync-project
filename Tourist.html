<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOURIST CAMERA TEST</title>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">
    <h2>TOURIST SYNC</h2>
    
    <video id="remoteVideo" autoplay playsinline webkit-playsinline muted 
           style="width:90%; aspect-ratio:16/9; background:#222; border:2px solid cyan; border-radius:8px;">
    </video>

    <div style="margin-top:20px;">
        <button id="syncBtn" onclick="syncCamera()" 
                style="padding:15px 30px; background:cyan; border:none; font-weight:bold; border-radius:5px;">
            SYNC SENSES
        </button>
    </div>

    <p id="status" style="font-size:12px; color:gray;">Ready. Click Sync.</p>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let pc;

        async function syncCamera() {
            const video = document.getElementById('remoteVideo');
            const status = document.getElementById('status');
            status.innerText = "Attempting Handshake...";
            
            // 1. Unmute/Play trick for mobile
            video.play().catch(() => console.log("Waiting for stream..."));

            if(pc) pc.close();
            pc = new RTCPeerConnection({ 
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }] 
            });

            // 2. Track Handling
            pc.ontrack = e => {
                status.innerText = "STREAM RECEIVED!";
                video.srcObject = e.streams[0];
                video.muted = false; // Try to unmute once stream arrives
                video.play().catch(() => {
                    video.muted = true; // Stay muted if browser blocks audio
                    video.play();
                });
            };

            // 3. Persistent Listener for Offer (Fixed for Mobile Race Condition)
            db.ref("calls/active/offer").on("value", async snap => {
                const offer = snap.val();
                if (!offer) {
                    status.innerText = "Waiting for Guide to start...";
                    return;
                }
                
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    await db.ref("calls/active/answer").set({ type: answer.type, sdp: answer.sdp });
                    status.innerText = "Answer Sent. Awaiting ICE...";
                } catch (err) {
                    console.error("Signal Error:", err);
                }
            });

            // 4. ICE Candidate Listener
            db.ref("calls/active/guideCandidates").on("child_added", snap => {
                const candidate = snap.val();
                if (candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {});
                }
            });

            pc.oniceconnectionstatechange = () => {
                status.innerText = "Connection: " + pc.iceConnectionState;
            };
        }
    </script>
</body>
</html>
