<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        #main-layout { display: flex; height: 100vh; width: 100vw; }
        #street-view { flex: 1; background: #111; }
        #map-2d { width: 30%; background: #1a1a1a; border-left: 1px solid #333; }
        #resizer { width: 12px; cursor: col-resize; background: #222; z-index: 10; border-left: 1px solid #444; }
        #resizer:hover { background: #FFD700; }
        
        #vid-box { 
            position: absolute; top: 20px; right: 20px; width: 280px; aspect-ratio: 16/9; 
            background: #111; border: 2px solid #FFD700; border-radius: 12px; z-index: 1000; overflow: hidden; 
        }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        #controls { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 100; background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 50px; 
            border: 1px solid #FFD700; display: flex; gap: 15px;
        }
        button { background: #FFD700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        
        .guide-arrow {
            width: 0; height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 25px solid red;
            filter: drop-shadow(0 0 2px white);
        }
    </style>
</head>
<body>

    <div id="vid-box"><video id="remoteVideo" autoplay playsinline></video></div>

    <div id="main-layout">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="controls">
        <button id="tetherBtn" onclick="toggleTether()">Untether</button>
        <button id="joinBtn" onclick="joinVideo()">JOIN LIVE TOUR</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs", v: "weekly"
        });

        let panorama, map, guideMarker, arrowDiv, isTethered = true, pc;

        async function init() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
            
            const startPos = { lat: 40.7580, lng: -73.9855 };
            panorama = new StreetViewPanorama(document.getElementById("street-view"), { 
                position: startPos, 
                visible: true,
                disableDefaultUI: false 
            });

            map = new Map(document.getElementById("map-2d"), { 
                center: startPos, 
                zoom: 17, 
                streetViewControl: true, 
                mapId: "4504f8b373a3ad47" 
            });
            map.setStreetView(panorama);

            arrowDiv = document.createElement('div');
            arrowDiv.className = 'guide-arrow';
            
            guideMarker = new AdvancedMarkerElement({ map: map, position: startPos, content: arrowDiv });

            // --- THE SNAP-BACK ENGINE ---
            db.ref("tour/guide").on("value", (snap) => {
                const data = snap.val();
                if (!data) return;

                // Update Red Arrow on 2D Map
                guideMarker.position = { lat: data.position.lat, lng: data.position.lng };
                arrowDiv.style.transform = `rotate(${data.pov.heading}deg)`;

                // Force Sync (The Snap-Back)
                if (isTethered) {
                    panorama.setPosition(data.position);
                    panorama.setPov(data.pov);
                    map.setCenter(data.position);
                }
            });
        }

        function toggleTether() {
            isTethered = !isTethered;
            document.getElementById("tetherBtn").innerText = isTethered ? "Untether" : "Tether Me";
            // Immediate snap back when clicking "Tether Me"
            if (isTethered) {
                db.ref("tour/guide").once("value", (s) => {
                    const d = s.val();
                    panorama.setPosition(d.position);
                    panorama.setPov(d.pov);
                });
            }
        }

        // Resizer Logic
        const resizer = document.getElementById("resizer");
        const rightSide = document.getElementById("map-2d");
        let isResizing = false;
        resizer.addEventListener("mousedown", () => isResizing = true);
        window.addEventListener("mousemove", (e) => { if(isResizing) rightSide.style.width = (window.innerWidth - e.clientX) + "px"; });
        window.addEventListener("mouseup", () => isResizing = false);

        // --- CAMERA FIX ---
        async function joinVideo() {
            console.log("Starting connection...");
            const vid = document.getElementById('remoteVideo');
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

            pc.ontrack = e => {
                console.log("VIDEO TRACK DETECTED");
                vid.srcObject = e.streams[0];
                vid.play().catch(err => console.error("Auto-play error:", err));
            };

            pc.onicecandidate = e => {
                if(e.candidate) db.ref("calls/active/touristCandidates").push(e.candidate.toJSON());
            };

            db.ref("calls/active/offer").on("value", async s => {
                const offer = s.val();
                if (offer && pc.signalingState !== "stable") {
                    console.log("Offer received, sending answer...");
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref("calls/active/answer").set({ type: ans.type, sdp: ans.sdp });
                }
            });

            db.ref("calls/active/guideCandidates").on("child_added", s => {
                if(s.val() && pc.remoteDescription) {
                    pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(e => console.error("ICE error:", e));
                }
            });
        }
        init();
    </script>
</body>
</html>
