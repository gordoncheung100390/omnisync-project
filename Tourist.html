<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        
        #container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        #street-view { flex: 1; min-width: 100px; background: #111; }
        
        #resizer {
            width: 10px; background: #222; cursor: col-resize; z-index: 10;
            border-left: 1px solid #333; border-right: 1px solid #333; transition: 0.2s;
        }
        #resizer:hover { background: #FFD700; }

        #map-2d { width: 25%; min-width: 100px; background: #1a1a1a; }
        
        /* VIDEO WINDOW */
        #guide-video-container {
            position: absolute; top: 20px; right: 20px;
            width: 260px; aspect-ratio: 16/9;
            background: #111; border: 2px solid #FFD700; border-radius: 12px;
            z-index: 1000; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT SYSTEM */
        #chat-container {
            position: absolute; bottom: 100px; left: 20px; width: 300px; 
            height: 250px; background: rgba(0,0,0,0.75); border-radius: 12px;
            display: flex; flex-direction: column; border: 1px solid #444; z-index: 500;
            backdrop-filter: blur(5px);
        }
        #messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
        .msg b { color: #FFD700; margin-right: 5px; }
        #chat-input-area { display: flex; border-top: 1px solid #444; padding: 5px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        #send-btn { background: #FFD700; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* CONTROL OVERLAY */
        #overlay-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 50px; border: 1px solid #FFD700;
        }
        button.ui-btn { background: #FFD700; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        button.off { background: #444; color: #ccc; }
        #status-text { font-size: 11px; font-weight: bold; color: #FFD700; min-width: 90px; text-align: center; }
    </style>
</head>
<body>

    <div id="guide-video-container">
        <video id="remoteVideo" autoplay playsinline muted></video>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <span id="status-text">TETHERED</span>
        <button class="ui-btn" id="tetherBtn" onclick="toggleTether()">Untether</button>
        <button class="ui-btn" id="joinBtn" onclick="joinVideo()">JOIN LIVE</button>
    </div>

                rightSide.style.width = newWidth + "px";
                if(map) google.maps.event.trigger(map, "resize");
            }
        });
        window.addEventListener("mouseup", () => isResizing = false);

        let panorama, map, guideMarker, isTethered = true, pc;

        async function init() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
            const startPos = { lat: 40.7580, lng: -73.9855 };

            panorama = new StreetViewPanorama(document.getElementById("street-view"), {
                position: startPos, visible: true, addressControl: false
            });
            map = new Map(document.getElementById("map-2d"), { center: startPos, zoom: 17 });
            map.setStreetView(panorama);

            guideMarker = new google.maps.Marker({
                position: startPos, map: map,
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#F00", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2 }
            });

            // THE SNAP ENGINE
            db.ref("tour/guide").on("value", (snap) => {
                const data = snap.val();
                if (!data || !panorama) return;
                
                // Update Marker
                guideMarker.setPosition(data.position);
                const icon = guideMarker.getIcon();
                icon.rotation = data.pov.heading;
                guideMarker.setIcon(icon);

                // Force Snap if Tethered
                if (isTethered) {
                    // Use setOptions to update everything in one hardware cycle
                    panorama.setOptions({
                        position: data.position,
                        pov: data.pov
                    });
                    map.panTo(data.position);
                }
            });
        }

        function toggleTether() {
            isTethered = !isTethered;
            document.getElementById("tetherBtn").innerText = isTethered ? "Untether" : "Tether Me";
            document.getElementById("status-text").innerText = isTethered ? "TETHERED" : "ROAMING";
            if(isTethered) {
                db.ref("tour/guide").once("value", s => {
                    const d = s.val();
                    if(d) panorama.setOptions({ position: d.position, pov: d.pov });
                });
            }
        }

        // --- CHAT ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            db.ref("chat").push({ sender: "Tourist", text: input.value, timestamp: Date.now() });
            input.value = "";
        }

        db.ref("chat").limitToLast(15).on("child_added", (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b>${data.sender}:</b> ${data.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
