<!DOCTYPE html>
<html>
<body>
    <h2>TOURIST (RECEIVER)</h2>
    <video id="remoteVideo" autoplay playsinline webkit-playsinline muted style="width:300px; background:black;"></video>
    <button onclick="syncCamera()" style="padding:20px; background:cyan;">2. SYNC CAMERA (CLICK ON MOBILE)</button>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let pc;

        async function syncCamera() {
            const video = document.getElementById('remoteVideo');
            // MOBILE STEP 1: Interact with video element to unlock it
            video.play(); 

            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            
            pc.ontrack = e => {
                video.srcObject = e.streams[0];
                // MOBILE STEP 2: Force play. If audio blocks it, we mute and play.
                video.play().catch(() => {
                    video.muted = true;
                    video.play();
                });
            };

            db.ref("calls/active/offer").on("value", async snap => {
                if (!snap.val()) return;
                await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await db.ref("calls/active/answer").set({ type: answer.type, sdp: answer.sdp });
            });

            db.ref("calls/active/guideCandidates").on("child_added", snap => {
                if (snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }
    </script>
</body>
</html>
