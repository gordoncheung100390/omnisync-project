<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW v1,1</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        #main-layout { display: grid; grid-template-columns: 3fr 1fr; height: 100vh; width: 100vw; }
        #street-view { background: #111; height: 100%; width: 100%; }
        #map-2d { background: #1a1a1a; height: 100%; width: 100%; border-left: 2px solid #333; }
        
        /* VIDEO CONTAINER */
        #guide-video-container {
            position: absolute; top: 20px; right: 20px;
            width: 260px; aspect-ratio: 16/9;
            background: #111; border: 2px solid #FFD700; border-radius: 12px;
            z-index: 1000; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* CONTROL OVERLAY */
        #overlay-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 50px; border: 1px solid #FFD700;
        }
        button { background: #FFD700; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button.off { background: #444; color: #ccc; }
        #status-text { font-size: 11px; font-weight: bold; color: #FFD700; min-width: 90px; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="guide-video-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="main-layout">
        <div id="street-view"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <span id="status-text">Tethered</span>
        <button id="tetherBtn" onclick="toggleTether()">Untether</button>
        <button id="joinBtn" onclick="joinVideo()">START VIDEO & AUDIO</button>
    </div>

    <script>
        // --- 1. FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. GOOGLE MAPS LOADER ---
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs",
            v: "weekly"
        });

        let panorama, map, guideMarker, isTethered = true, pc;

        async function init() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
            const startPos = { lat: 40.7580, lng: -73.9855 };

            panorama = new StreetViewPanorama(document.getElementById("street-view"), {
                position: startPos, visible: true, addressControl: false
            });

            map = new Map(document.getElementById("map-2d"), {
                center: startPos, zoom: 17, streetViewControl: true
            });

            // Connect Yellow Pegman to Panorama
            map.setStreetView(panorama);

            guideMarker = new google.maps.Marker({
                position: startPos, map: map,
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#F00", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2 }
            });

            // Listen for Guide
            db.ref("tour/guide").on("value", (snap) => {
                const data = snap.val();
                if (!data) return;
                
                // Update Red Arrow regardless of tether
                guideMarker.setPosition(data.position);
                const icon = guideMarker.getIcon();
                icon.rotation = data.pov.heading;
                guideMarker.setIcon(icon);

                // Move if tethered
                if (isTethered) {
                    panorama.setPosition(data.position);
                    panorama.setPov(data.pov);
                    map.setCenter(data.position);
                }
            });
        }

        // --- 3. TETHER LOGIC (SNAP BACK) ---
        function toggleTether() {
            isTethered = !isTethered;
            const btn = document.getElementById("tetherBtn");
            const status = document.getElementById("status-text");

            if (isTethered) {
                btn.innerText = "Untether";
                btn.classList.remove("off");
                status.innerText = "TETHERED";
                // FORCE SNAP
                db.ref("tour/guide").once("value").then(s => {
                    const d = s.val();
                    panorama.setPosition(d.position);
                    panorama.setPov(d.pov);
                });
            } else {
                btn.innerText = "Tether Me";
                btn.classList.add("off");
                status.innerText = "ROAMING";
            }
        }

        // --- 4. VIDEO & AUDIO LOGIC ---
        async function joinVideo() {
            document.getElementById('joinBtn').innerText = "CONNECTING...";
            const vid = document.getElementById('remoteVideo');

            pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });

            pc.ontrack = (event) => {
                console.log("Track received...");
                vid.srcObject = event.streams[0];
                
                // Explicit Unmute on Load
                vid.onloadedmetadata = () => {
                    vid.muted = false; 
                    vid.volume = 1.0;
                    vid.play().then(() => {
                        document.getElementById('joinBtn').style.display = 'none';
                    }).catch(e => {
                        console.warn("Autoplay block. Forcing muted play.");
                        vid.muted = true;
                        vid.play();
                    });
                };
            };

            pc.onicecandidate = (e) => {
                if (e.candidate) db.ref("calls/active/touristCandidates").push(e.candidate.toJSON());
            };

            db.ref("calls/active/guideCandidates").on("child_added", (snap) => {
                if (snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });

            db.ref("calls/active/offer").once("value", async (snap) => {
                const offer = snap.val();
                if (offer) {
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    db.ref("calls/active/answer").set({ type: answer.type, sdp: answer.sdp });
                }
            });
        }

        init();
    </script>
</body>
</html>
