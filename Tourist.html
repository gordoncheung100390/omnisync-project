<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        
        #container { display: flex; height: 100vh; width: 100vw; }
        #street-view { flex: 1; background: #000; }
        #map-2d { width: 30%; background: #1a1a1a; border-left: 1px solid #444; position: relative; }
        #resizer { width: 6px; background: #222; cursor: col-resize; z-index: 10; border-left: 1px solid #444; }

        @media (max-width: 768px) {
            #container { flex-direction: column; }
            #street-view { height: 60vh; width: 100%; }
            #map-2d { height: 40vh; width: 100%; border-top: 1px solid #444; border-left: none; }
            #resizer { display: none; }
            #guide-video-container { width: 130px !important; top: 10px !important; right: 10px !important; }
            #chat-container { width: 160px !important; height: 100px !important; bottom: 85px !important; left: 10px !important; border-radius: 4px; }
            #overlay-ui { width: 92%; bottom: 10px; padding: 10px; gap: 8px; }
        }

        #name-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #name-box { background: #111; padding: 40px; border: 1px solid #333; text-align: center; border-radius: 4px; }
        input { padding: 12px; background: #000; border: 1px solid #fff; color: #fff; margin-bottom: 20px; width: 220px; font-size: 16px; font-family: inherit; }
        
        #guide-video-container { position: absolute; top: 20px; right: 20px; width: 240px; aspect-ratio: 16/9; border: 2px solid #fff; z-index: 3000; background: #111; overflow: hidden; }
        #guide-video { width: 100%; height: 100%; object-fit: cover; }
        
        #chat-container { position: absolute; bottom: 100px; left: 20px; width: 280px; height: 180px; background: rgba(0,0,0,0.85); border: 1px solid #333; display: flex; flex-direction: column; z-index: 2000; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; }
        #chat-msg { background: transparent; border: none; border-top: 1px solid #333; color: #fff; padding: 10px; font-size: 11px; outline: none; }
        
        #overlay-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; gap: 15px; background: rgba(0,0,0,0.95); padding: 12px; border: 1px solid #444; border-radius: 6px; align-items: center; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { background: #fff; color: #000; border: none; padding: 10px 18px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; border-radius: 2px; }
        #guide-status { width: 10px; height: 10px; border-radius: 50%; background: #555; transition: 0.3s; }
        #guide-status.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div id="name-overlay"><div id="name-box"><h2>INITIALIZE CALLSIGN</h2><input type="text" id="name-in" placeholder="ENTER NAME..."><br><button class="btn" onclick="startSession()">Start Mission</button></div></div>

    <div id="guide-video-container"><video id="guide-video" autoplay playsinline muted></video></div>

    <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="chat-msg" placeholder="SEND MESSAGE..." onkeypress="if(event.key==='Enter') sendChat()">
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <div id="guide-status"></div>
        <button class="btn" id="t-btn" onclick="toggleTether()">Untether</button>
        <button class="btn" onclick="joinLive()" style="background:#00E5FF">Sync Senses</button>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&callback=initApp" async defer></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = "T_" + Math.floor(Math.random()*9999);
        let userName, panorama, map, guideMarker, touristSelfMarker, isTethered = true, pc;

        function startSession() { 
            userName = document.getElementById("name-in").value || "Tourist";
            document.getElementById("name-overlay").remove(); 
            window.dispatchEvent(new Event('resize')); 
        }

        async function initApp() {
            const startPos = { lat: 40.75, lng: -73.98 };
            panorama = new google.maps.StreetViewPanorama(document.getElementById("street-view"), { position: startPos, visible: true, addressControl: false });
            map = new google.maps.Map(document.getElementById("map-2d"), { center: startPos, zoom: 17, streetViewControl: false });
            map.setStreetView(panorama);

            guideMarker = new google.maps.Marker({ 
                position: startPos, map: map, 
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 6, fillColor: "#F00", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2, rotation: 0 }, 
                zIndex: 1000 
            });

            touristSelfMarker = new google.maps.Marker({ 
                position: startPos, map: map, 
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 6, fillColor: "#FFD700", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2, rotation: 0 }, 
                zIndex: 500 
            });

            // Resizer Logic
            const resizer = document.getElementById("resizer");
            let isResizing = false;
            resizer.addEventListener("mousedown", () => isResizing = true);
            window.addEventListener("mousemove", (e) => { 
                if (isResizing) { 
                    document.getElementById("map-2d").style.width = (window.innerWidth - e.clientX) + "px"; 
                    google.maps.event.trigger(map, "resize"); 
                }
            });
            window.addEventListener("mouseup", () => isResizing = false);

            panorama.addListener("position_changed", () => {
                const p = panorama.getPosition();
                touristSelfMarker.setPosition(p);
                db.ref("tour/tourists/" + myId).update({ name: userName, lat: p.lat(), lng: p.lng() });
            });

            panorama.addListener("pov_changed", () => {
                let icon = touristSelfMarker.getIcon();
                icon.rotation = panorama.getPov().heading;
                touristSelfMarker.setIcon(icon);
            });

            db.ref("tour/guide").on("value", snap => {
                const data = snap.val();
                if(!data) return;
                document.getElementById("guide-status").classList.add("online");
                const pos = new google.maps.LatLng(data.position.lat, data.position.lng);
                guideMarker.setPosition(pos);
                if(data.pov) {
                    let icon = guideMarker.getIcon();
                    icon.rotation = data.pov.heading;
                    guideMarker.setIcon(icon);
                }
                if(isTethered) { 
                    panorama.setPosition(pos); 
                    if(data.pov) panorama.setPov(data.pov); 
                    map.panTo(pos); 
                }
            });
        }

        async function joinLive() {
            const v = document.getElementById("guide-video");
            v.muted = false; 
            v.load(); 
            v.play();

            if(pc) pc.close();
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

            pc.ontrack = (e) => {
                v.srcObject = e.streams[0];
                v.play().catch(() => { v.muted = true; v.play(); });
            };

            const offer = (await db.ref("calls/active/offer").once("value")).val();
            if(!offer) return alert("Guide stream not found.");

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await db.ref("calls/active/answer").set({ type: answer.type, sdp: answer.sdp });

            db.ref("calls/active/guideCandidates").on("child_added", s => {
                if(s.val()) pc.addIceCandidate(new RTCIceCandidate(s.val()));
            });
        }

        function toggleTether() {
            isTethered = !isTethered;
            document.getElementById("t-btn").innerText = isTethered ? "Untether" : "Tether";
            if(isTethered) {
                db.ref("tour/guide").once("value", s => {
                    const d = s.val();
                    if(d && d.position) {
                        panorama.setPosition(new google.maps.LatLng(d.position.lat, d.position.lng));
                        if(d.pov) panorama.setPov(d.pov);
                    }
                });
            }
        }

        function sendChat() {
            const el = document.getElementById("chat-msg");
            if(el.value.trim()) db.ref("chat").push({ sender: userName, text: el.value.toUpperCase() });
            el.value = "";
        }

        db.ref("chat").on("child_added", snap => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<span style="color:#00E5FF"><b>${d.sender}:</b></span> ${d.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        });

        window.onbeforeunload = () => db.ref("tour/tourists/" + myId).remove();
    </script>
</body>
</html>
