<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW maps-video-split</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        
        /* THE FLEX LAYOUT */
        #container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #street-view { flex: 1; min-width: 100px; background: #111; }
        
        /* THE MOVABLE SPLIT LINE */
        #resizer {
            width: 10px;
            background: #222;
            cursor: col-resize;
            z-index: 10;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            transition: background 0.2s;
        }
        #resizer:hover { background: #FFD700; }

        #map-2d { 
            width: 25%; /* Default width */
            min-width: 100px;
            background: #1a1a1a;
        }
        
        /* VIDEO CONTAINER */
        #guide-video-container {
            position: absolute; top: 20px; right: 20px;
            width: 260px; aspect-ratio: 16/9;
            background: #111; border: 2px solid #FFD700; border-radius: 12px;
            z-index: 1000; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- CHAT SYSTEM OVERLAY --- */
        #chat-container {
            position: absolute; bottom: 100px; left: 20px; width: 280px; 
            height: 220px; background: rgba(0,0,0,0.8); border-radius: 12px;
            display: flex; flex-direction: column; border: 1px solid #444; z-index: 500;
            backdrop-filter: blur(5px);
        }
        #messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; display: flex; flex-direction: column; gap: 6px; }
        .msg-line { line-height: 1.4; }
        .msg-line b { color: #FFD700; }
        #chat-input-area { display: flex; border-top: 1px solid #444; padding: 5px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; font-size: 13px; }
        #send-btn { background: #FFD700; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; font-weight: bold; color: black; }

        /* CONTROL OVERLAY */
        #overlay-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 50px; border: 1px solid #FFD700;
        }
        button { background: #FFD700; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button.off { background: #444; color: #ccc; }
        #status-text { font-size: 11px; font-weight: bold; color: #FFD700; min-width: 90px; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="guide-video-container">
        <video id="remoteVideo" autoplay playsinline muted></video>
    </div>

    <div id="chat-container">
        <div id="messages" id="message-list"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message guide..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <span id="status-text">Tethered</span>
        <button id="tetherBtn" onclick="toggleTether()">Untether</button>
        <button id="joinBtn" onclick="joinVideo()">START VIDEO & AUDIO</button>
    </div>
