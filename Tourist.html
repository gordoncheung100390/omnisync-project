<script>
    // ... (Keep init and markers as they are) ...

    function toggleTether() {
        isTethered = !isTethered;
        const btn = document.getElementById("tetherBtn");
        const status = document.getElementById("status-text");
        
        btn.innerText = isTethered ? "Untether" : "Tether";
        status.innerText = isTethered ? "TETHERED" : "ROAMING";
        status.style.color = isTethered ? "#fff" : "#ffcc00";

        if (isTethered) {
            // SNAP BACK LOGIC
            db.ref("tour/guide").once("value", (snap) => {
                const d = snap.val();
                if (d) {
                    panorama.setPosition(d.position);
                    panorama.setPov(d.pov);
                    map.panTo(d.position);
                }
            });
        }
    }

    async function joinVideo() {
        const vid = document.getElementById('remoteVideo');
        const joinBtn = document.getElementById('joinBtn');
        joinBtn.innerText = "CONNECTING...";

        // Mobile browsers require a user gesture to play audio
        if (window.AudioContext || window.webkitAudioContext) {
            new (window.AudioContext || window.webkitAudioContext)().resume();
        }

        pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

        pc.ontrack = (e) => {
            console.log("Stream Received");
            vid.srcObject = e.streams[0];
            vid.setAttribute('playsinline', 'true');
            vid.setAttribute('autoplay', 'true');
            vid.play().catch(err => console.log("Auto-play blocked:", err));
            joinBtn.style.display = 'none';
        };

        // ... (Keep IceCandidate and Offer/Answer logic) ...
    }
</script>
