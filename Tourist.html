<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICE BREAKER | TOURIST</title>
</head>
<body style="background:#000; color:#00E5FF; text-align:center; font-family:monospace; padding:20px;">
    <h2 style="letter-spacing:2px;">CONNECTION TERMINAL</h2>
    
    <video id="remoteVideo" autoplay playsinline webkit-playsinline muted 
           style="width:100%; max-width:400px; aspect-ratio:16/9; background:#111; border:1px solid #333; margin-bottom:20px;">
    </video>

    <div id="status-box" style="font-size:10px; color:#666; margin-bottom:20px; text-transform:uppercase;">
        Status: <span id="status" style="color:#fff;">Idle</span><br>
        ICE: <span id="ice-status" style="color:#fff;">None</span>
    </div>

    <button onclick="syncSenses()" 
            style="width:100%; max-width:400px; padding:20px; background:transparent; border:1px solid #00E5FF; color:#00E5FF; font-weight:bold; cursor:pointer;">
        ESTABLISH SYNC
    </button>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let pc;

        // Expanded ICE Servers to bypass mobile firewalls
        const config = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" }
            ]
        };

        async function syncSenses() {
            const video = document.getElementById('remoteVideo');
            const status = document.getElementById('status');
            const iceStatus = document.getElementById('ice-status');

            status.innerText = "Initializing PC...";
            
            if(pc) pc.close();
            pc = new RTCPeerConnection(config);

            // Handle incoming stream
            pc.ontrack = e => {
                status.innerText = "STREAM RECEIVED";
                video.srcObject = e.streams[0];
                video.play().catch(() => {
                    video.muted = true;
                    video.play();
                });
            };

            // ICE State Monitoring
            pc.oniceconnectionstatechange = () => {
                iceStatus.innerText = pc.iceConnectionState;
                if(pc.iceConnectionState === "connected") status.innerText = "SYNC ACTIVE";
                if(pc.iceConnectionState === "failed") status.innerText = "RETRYING...";
            };

            // Listen for Guide Offer
            db.ref("calls/active/offer").on("value", async snap => {
                const offer = snap.val();
                if (!offer) return;
                
                status.innerText = "Offer Detected...";
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                await db.ref("calls/active/answer").set({ 
                    type: answer.type, 
                    sdp: answer.sdp 
                });
                status.innerText = "Answer Transmitted...";
            });

            // ICE Candidate Exchange
            db.ref("calls/active/guideCandidates").on("child_added", snap => {
                const candidate = snap.val();
                if (candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {});
                }
            });

            // Mobile video unlock
            video.play().catch(() => {});
        }
    </script>
</body>
</html>
