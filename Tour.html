<!DOCTYPE html>
<html>
<body>
    <h2>GUIDE (SENDER)</h2>
    <video id="localVideo" autoplay playsinline muted style="width:300px; background:black;"></video>
    <button onclick="startBroadcast()" style="padding:20px;">1. START CAMERA & BROADCAST</button>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let pc;

        async function startBroadcast() {
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            pc.onicecandidate = e => {
                if (e.candidate) db.ref("calls/active/guideCandidates").push(e.candidate.toJSON());
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref("calls/active/offer").set({ type: offer.type, sdp: offer.sdp });

            db.ref("calls/active/answer").on("value", snap => {
                if (snap.val() && pc.signalingState !== "stable") {
                    pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                }
            });
        }
    </script>
</body>
</html>
