<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNISYNC | MASTER CONSOLE</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        #container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #street-view { height: 60vh; width: 100%; background: #111; }
        #map-2d { height: 40vh; width: 100%; background: #1a1a1a; }
        #resizer { display: none; }

        @media (min-width: 900px) {
            #container { flex-direction: row; }
            #street-view { height: 100%; flex: 1; }
            #map-2d { height: 100%; width: 30%; }
            #resizer { display: block; width: 4px; background: #222; cursor: col-resize; z-index: 10; border-left: 1px solid #444; }
        }

        #search-container { position: absolute; top: 15px; left: 15px; z-index: 1000; width: calc(100% - 30px); max-width: 350px; display: flex; flex-direction: column; gap: 8px; }
        #pac-input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.8); color: white; outline: none; backdrop-filter: blur(10px); box-sizing: border-box; }
        #broadcast-btn { background: #fff; color: #000; border: none; padding: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        #video-container { position: absolute; top: 15px; right: 15px; width: 130px; aspect-ratio: 16/9; border: 1px solid #fff; background: #000; z-index: 2000; overflow: hidden; }
        @media (min-width: 900px) { #video-container { width: 220px; top: auto; bottom: 20px; right: 20px; } }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #chat-container { position: absolute; bottom: 20px; left: 15px; width: 180px; height: 150px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; z-index: 500; backdrop-filter: blur(10px); }
        @media (min-width: 900px) { #chat-container { width: 300px; height: 250px; bottom: 20px; } }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; }
        #chat-input-area { display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; font-size: 12px; }
        #send-btn { background: transparent; color: #fff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="search-container">
        <input id="pac-input" type="text" placeholder="SEARCH DESTINATION...">
        <button id="broadcast-btn" onclick="startBroadcast()">START MISSION</button>
    </div>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>
    <div id="video-container"><video id="localVideo" autoplay playsinline muted></video></div>
    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref("chat").remove();
        db.ref("tour/tourists").remove(); // Clear previous session tourists

        let panorama, map, pc, localStream, touristMarkers = {};

        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs", v: "weekly"
        });

        async function initApp() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama, StreetViewService } = await google.maps.importLibrary("streetView");
            const { Autocomplete } = await google.maps.importLibrary("places");
            const startPos = { lat: 40.7562, lng: -73.9861 };
            
            map = new Map(document.getElementById("map-2d"), { center: startPos, zoom: 15, mapId: "4504f8b373a3ad47" });
            panorama = new StreetViewPanorama(document.getElementById("street-view"), { position: startPos, visible: true, addressControl: false });
            map.setStreetView(panorama);

            const autocomplete = new Autocomplete(document.getElementById("pac-input"));
            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (place.geometry) {
                    map.setCenter(place.geometry.location);
                    panorama.setPosition(place.geometry.location);
                }
            });

            panorama.addListener("position_changed", updateFirebase);
            panorama.addListener("pov_changed", updateFirebase);

            // RADAR: Listen for Tourists
            db.ref("tour/tourists").on("value", (snap) => {
                const tourists = snap.val() || {};
                for (let id in touristMarkers) { if (!tourists[id]) { touristMarkers[id].setMap(null); delete touristMarkers[id]; } }
                for (let id in tourists) {
                    const pos = { lat: tourists[id].lat, lng: tourists[id].lng };
                    if (touristMarkers[id]) touristMarkers[id].setCenter(pos);
                    else {
                        touristMarkers[id] = new google.maps.Circle({
                            strokeColor: "#00E5FF", strokeOpacity: 0.8, strokeWeight: 2,
                            fillColor: "#00E5FF", fillOpacity: 0.35, map: map, center: pos, radius: 15
                        });
                    }
                }
            });
        }

        function updateFirebase() {
            const pos = panorama.getPosition();
            const pov = panorama.getPov();
            if (pos && pov) {
                db.ref("tour/guide").set({
                    position: { lat: pos.lat(), lng: pos.lng() },
                    pov: { heading: pov.heading, pitch: pov.pitch, zoom: pov.zoom }
                });
            }
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) db.ref("chat").push({ sender: "Guide", text: input.value });
            input.value = "";
        }

        db.ref("chat").on("child_added", (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b>${data.sender}:</b> ${data.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });

        async function startBroadcast() {
            document.getElementById('broadcast-btn').innerText = "LIVE...";
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = (e) => { if (e.candidate) db.ref("calls/active/guideCandidates").push(e.candidate.toJSON()); };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref("calls/active/offer").set({ type: offer.type, sdp: offer.sdp });
            db.ref("calls/active/answer").on("value", snap => { if (snap.val() && !pc.currentRemoteDescription) pc.setRemoteDescription(new RTCSessionDescription(snap.val())); });
            db.ref("calls/active/touristCandidates").on("child_added", snap => { if (snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val())); });
        }
        initApp();
    </script>
</body>
</html>
