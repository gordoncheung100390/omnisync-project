<script>
    // ... (Keep Firebase Config & Maps Loader as they are) ...

    let panorama, map, pc, localStream, touristMarkers = {};

    async function initApp() {
        const { Map } = await google.maps.importLibrary("maps");
        const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
        const { Autocomplete } = await google.maps.importLibrary("places");
        
        const startPos = { lat: 40.7562, lng: -73.9861 };
        
        map = new Map(document.getElementById("map-2d"), { 
            center: startPos, 
            zoom: 15, 
            mapId: "4504f8b373a3ad47",
            disableDefaultUI: true // Cleaner for mobile
        });

        panorama = new StreetViewPanorama(document.getElementById("street-view"), { 
            position: startPos, 
            visible: true, 
            addressControl: false,
            motionTracking: false, // Prevents "gyroscope" bugs on mobile
            motionTrackingControl: false 
        });

        map.setStreetView(panorama);

        // --- FIXED RESIZER LOGIC ---
        const resizer = document.getElementById("resizer");
        const rightSide = document.getElementById("map-2d");
        let isResizing = false;

        resizer.addEventListener("mousedown", (e) => {
            isResizing = true;
            document.body.style.cursor = "col-resize";
        });

        window.addEventListener("mousemove", (e) => {
            if (!isResizing || window.innerWidth < 900) return;
            const newWidth = window.innerWidth - e.clientX;
            if (newWidth > 150 && newWidth < window.innerWidth * 0.7) {
                rightSide.style.width = newWidth + "px";
            }
        });

        window.addEventListener("mouseup", () => {
            isResizing = false;
            document.body.style.cursor = "default";
            google.maps.event.trigger(map, "resize");
        });

        // ... (Keep Autocomplete & Radar logic) ...
    }

    // --- FIXED WEBCAM BROADCAST ---
    async function startBroadcast() {
        try {
            const btn = document.getElementById('broadcast-btn');
            btn.innerText = "REQUESTING CAMERA...";
            
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720 }, 
                audio: true 
            });
            
            const videoElement = document.getElementById('localVideo');
            videoElement.srcObject = localStream;
            // Force play for mobile
            videoElement.play(); 
            
            btn.innerText = "LIVE MISSION";
            btn.style.background = "#ff0000";
            btn.style.color = "#fff";

            // WebRTC Logic continues...
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            pc.onicecandidate = (e) => { if (e.candidate) db.ref("calls/active/guideCandidates").push(e.candidate.toJSON()); };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref("calls/active/offer").set({ type: offer.type, sdp: offer.sdp });
            
            db.ref("calls/active/answer").on("value", snap => {
                if (snap.val() && !pc.currentRemoteDescription) {
                    pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                }
            });
        } catch (err) {
            console.error("Camera Error:", err);
            alert("Please allow camera access to broadcast.");
        }
    }
    initApp();
</script>
