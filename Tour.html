<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | MASTER CONSOLE</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #111; color: #fff; }
        #container { display: flex; height: 100vh; width: 100vw; position: relative; }
        #street-view { flex: 1; background: #000; }
        #map-2d { width: 30%; background: #222; border-left: 1px solid #444; }
        #resizer { width: 8px; background: #333; cursor: col-resize; z-index: 10; position: relative; }
        #resizer:hover { background: #555; }
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 300px; }
        .ctrl-panel { background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #444; backdrop-filter: blur(10px); }
        #pac-input { width: 100%; padding: 10px; background: #000; border: 1px solid #555; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; margin-top: 5px; }
        #broadcast-btn { background: #fff; color: #000; }
        #local-video-container { position: absolute; bottom: 20px; right: 20px; width: 220px; aspect-ratio: 16/9; border: 2px solid #fff; background: #000; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #chat-container { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 200px; background: rgba(0,0,0,0.8); border: 1px solid #333; display: flex; flex-direction: column; z-index: 500; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="ctrl-panel">
            <input id="pac-input" type="text" placeholder="SEARCH DESTINATION...">
            <button class="btn" id="broadcast-btn" onclick="startBroadcast()">Start Mission</button>
            <button class="btn" style="background:#ff4444;color:#fff" onclick="db.ref().remove();location.reload();">Purge Session</button>
            <div id="tourist-list" style="margin-top:10px; font-size:11px; color:#00E5FF;">Waiting for Map...</div>
        </div>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="chat-in" placeholder="Command..." style="background:transparent;border:none;border-top:1px solid #333;color:#fff;padding:8px;" onkeypress="if(event.key==='Enter') sendMsg()">
    </div>

    <div id="local-video-container"><video id="localVideo" autoplay playsinline muted></video></div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places&callback=initApp" async defer></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let panorama, map, touristMarkers = {};

        function initApp() {
            console.log("Maps Initializing...");
            const startPos = { lat: 40.7562, lng: -73.9861 };
            
            // 2D Map setup
            map = new google.maps.Map(document.getElementById("map-2d"), {
                center: startPos, zoom: 15, streetViewControl: true
            });

            // Street View Setup
            panorama = new google.maps.StreetViewPanorama(document.getElementById("street-view"), {
                position: startPos, visible: true
            });
            map.setStreetView(panorama);

            // Resizer Logic
            const resizer = document.getElementById("resizer");
            const map2d = document.getElementById("map-2d");
            let isResizing = false;
            resizer.addEventListener("mousedown", () => isResizing = true);
            window.addEventListener("mousemove", (e) => {
                if (isResizing) {
                    let newWidth = window.innerWidth - e.clientX;
                    map2d.style.width = newWidth + "px";
                    google.maps.event.trigger(map, "resize");
                }
            });
            window.addEventListener("mouseup", () => isResizing = false);

            // Autocomplete
            const input = document.getElementById("pac-input");
            const autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.addListener("place_changed", () => {
                const p = autocomplete.getPlace();
                if(p.geometry) { 
                    panorama.setPosition(p.geometry.location); 
                    map.setCenter(p.geometry.location); 
                }
            });

            // Sync to Firebase
            panorama.addListener("position_changed", () => {
                db.ref("tour/guide/position").set({ lat: panorama.getPosition().lat(), lng: panorama.getPosition().lng() });
            });
            panorama.addListener("pov_changed", () => {
                db.ref("tour/guide/pov").set(panorama.getPov());
            });

            // Tourist Listener
            db.ref("tour/tourists").on("value", (snap) => {
                const data = snap.val() || {};
                const names = [];
                for (let id in touristMarkers) { if (!data[id]) { touristMarkers[id].setMap(null); delete touristMarkers[id]; } }
                for (let id in data) {
                    names.push(data[id].name);
                    const pos = { lat: data[id].lat, lng: data[id].lng };
                    if (touristMarkers[id]) {
                        touristMarkers[id].setPosition(pos);
                    } else {
                        touristMarkers[id] = new google.maps.Marker({
                            position: pos, map: map,
                            label: { text: data[id].name, color: "#00E5FF", fontWeight: "700" },
                            icon: { 
                                path: google.maps.SymbolPath.CIRCLE, scale: 6, 
                                fillColor: "#00E5FF", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2,
                                labelOrigin: new google.maps.Point(0, -15)
                            }
                        });
                    }
                }
                document.getElementById("tourist-list").innerText = "Active: " + (names.join(", ") || "None");
            });
        }

        function sendMsg() {
            const input = document.getElementById("chat-in");
            if(input.value) db.ref("chat").push({ sender: "GUIDE", text: input.value });
            input.value = "";
        }

        db.ref("chat").on("child_added", snap => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        });

        async function startBroadcast() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            pc.onicecandidate = e => e.candidate && db.ref("calls/active/guideCandidates").push(e.candidate.toJSON());
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            db.ref("calls/active/offer").set({ type: offer.type, sdp: offer.sdp });
            db.ref("calls/active/answer").on("value", s => {
                if(s.val() && pc.signalingState !== "stable") pc.setRemoteDescription(new RTCSessionDescription(s.val()));
            });
        }

        window.addEventListener('beforeunload', () => {
            db.ref("tour/guide").remove();
            db.ref("calls/active").remove();
        });
    </script>
</body>
</html>
