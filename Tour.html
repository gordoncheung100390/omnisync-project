<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOUR VIEW (GUIDE)</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        #container { display: flex; height: 100vh; width: 100vw; }
        #street-view { flex: 1; background: #111; }
        #resizer { width: 10px; background: #222; cursor: col-resize; z-index: 10; border-left: 1px solid #333; border-right: 1px solid #333; }
        #map-2d { width: 25%; background: #1a1a1a; }

        /* GUIDE VIDEO (Local Preview) */
        #local-video-container {
            position: absolute; top: 20px; left: 20px;
            width: 200px; aspect-ratio: 16/9;
            background: #000; border: 2px solid #FFD700; border-radius: 12px;
            z-index: 1000; overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT UI */
        #chat-container {
            position: absolute; bottom: 100px; right: 20px; width: 280px; 
            height: 250px; background: rgba(0,0,0,0.85); border-radius: 12px;
            display: flex; flex-direction: column; border: 1px solid #444; z-index: 500;
        }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input-area { display: flex; border-top: 1px solid #444; padding: 5px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; }
        .chat-btn { background: #FFD700; border: none; padding: 0 10px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; }

        /* CONTROLS */
        #overlay-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 50px; border: 1px solid #FFD700;
        }
        button.ui-btn { background: #FFD700; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <div id="local-video-container">
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message tourists..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="chat-btn" onclick="sendMessage()">></button>
        </div>
        <button onclick="clearChat()" style="font-size: 9px; background: #333; color: #888; border: none; padding: 2px; cursor: pointer;">CLEAR ALL HISTORY</button>
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <button class="ui-btn" onclick="startBroadcast()">START BROADCAST</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- SESSION RESET: CLEAR CHAT ON LOAD ---
        function clearChat() {
            db.ref("chat").remove();
        }
        clearChat(); // Run automatically on refresh

        let panorama, map, pc;

        // MAP LOADER
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs", v: "weekly"
        });

        async function init() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
            const startPos = { lat: 40.7580, lng: -73.9855 };

            panorama = new StreetViewPanorama(document.getElementById("street-view"), {
                position: startPos, visible: true
            });

            map = new Map(document.getElementById("map-2d"), { center: startPos, zoom: 17 });

            // SYNC POSITION TO FIREBASE
            panorama.addListener("status_changed", sync);
            panorama.addListener("position_changed", sync);
            panorama.addListener("pov_changed", sync);

            function sync() {
                db.ref("tour/guide").set({
                    position: panorama.getPosition().toJSON(),
                    pov: panorama.getPov()
                });
            }
        }

        // CHAT ENGINE
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) db.ref("chat").push({ sender: "Guide", text: input.value });
            input.value = "";
        }

        db.ref("chat").on("child_added", (snap) => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });

        db.ref("chat").on("value", snap => {
            if(!snap.exists()) document.getElementById("messages").innerHTML = "";
        });

        // BROADCAST ENGINE (Simplfied WebRTC)
        async function startBroadcast() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;

            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            pc.onicecandidate = e => { if(e.candidate) db.ref("calls/active/guideCandidates").push(e.candidate.toJSON()); };
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            db.ref("calls/active/offer").set({ type: offer.type, sdp: offer.sdp });

            db.ref("calls/active/answer").on("value", async snap => {
                if(snap.val() && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                }
            });

            db.ref("calls/active/touristCandidates").on("child_added", snap => {
                if(snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        window.onload = init;
    </script>
</body>
</html>
