<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | GUIDE CONSOLE</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        #container { display: flex; height: 100vh; width: 100vw; }
        #street-view { flex: 1; }
        #map-2d { width: 30%; background: #1a1a1a; border-left: 1px solid #444; }
        #resizer { width: 6px; background: #222; cursor: col-resize; z-index: 10; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #444; border-radius: 4px; }
        .btn { background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; width: 100%; margin-top: 5px; }
        .btn:hover { background: #00E5FF; }
        
        #chat-container { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 200px; background: rgba(0,0,0,0.9); border: 1px solid #444; display: flex; flex-direction: column; z-index: 1000; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; color: #aaa; }
        #chat-input { background: transparent; border: none; border-top: 1px solid #444; color: #fff; padding: 10px; font-size: 11px; outline: none; }
        
        #guide-preview { position: absolute; top: 20px; right: 20px; width: 200px; aspect-ratio: 16/9; border: 2px solid #00E5FF; background: #000; z-index: 1000; }
        #guide-v { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="panel">
            <div style="font-size: 10px; font-weight: 700; color: #00E5FF; margin-bottom: 5px;">MISSION CONTROL</div>
            <button class="btn" onclick="startBroadcast()">Initialize Stream</button>
            <div id="participant-count" style="font-size: 9px; margin-top: 8px; color: #666;">TOURISTS: 0</div>
        </div>
    </div>

    <div id="guide-preview">
        <video id="guide-v" autoplay playsinline muted></video>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="chat-input" placeholder="BROADCAST MESSAGE..." onkeypress="if(event.key==='Enter') sendChat()">
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places&callback=initApp" async defer></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let panorama, map, pc, localStream;
        let touristMarkers = {};

        async function initApp() {
            const startPos = { lat: 40.7588, lng: -73.9851 }; // Times Square default

            panorama = new google.maps.StreetViewPanorama(document.getElementById("street-view"), {
                position: startPos,
                pov: { heading: 0, pitch: 0 },
                visible: true,
                addressControl: false,
                panControl: true
            });

            map = new google.maps.Map(document.getElementById("map-2d"), {
                center: startPos,
                zoom: 17,
                streetViewControl: false
            });
            map.setStreetView(panorama);

            // Resizer logic
            const resizer = document.getElementById("resizer");
            let isResizing = false;
            resizer.addEventListener("mousedown", () => isResizing = true);
            window.addEventListener("mousemove", (e) => { 
                if (isResizing) { 
                    document.getElementById("map-2d").style.width = (window.innerWidth - e.clientX) + "px"; 
                    google.maps.event.trigger(map, "resize"); 
                }
            });
            window.addEventListener("mouseup", () => isResizing = false);

            // TRACK GUIDE MOVEMENTS
            panorama.addListener("position_changed", syncGuide);
            panorama.addListener("pov_changed", syncGuide);

            // LISTEN FOR TOURISTS
            db.ref("tour/tourists").on("value", snap => {
                const tourists = snap.val() || {};
                document.getElementById("participant-count").innerText = "TOURISTS: " + Object.keys(tourists).length;
                
                // Clear disconnected
                Object.keys(touristMarkers).forEach(id => {
                    if (!tourists[id]) {
                        touristMarkers[id].setMap(null);
                        delete touristMarkers[id];
                    }
                });

                // Update/Create Tourist Dots with Names
                for (let id in tourists) {
                    const data = tourists[id];
                    const pos = { lat: data.lat, lng: data.lng };

                    if (touristMarkers[id]) {
                        touristMarkers[id].setPosition(pos);
                    } else {
                        touristMarkers[id] = new google.maps.Marker({
                            position: pos,
                            map: map,
                            label: {
                                text: data.name || "User",
                                color: "#00E5FF",
                                fontWeight: "700",
                                fontSize: "11px"
                            },
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 6,
                                fillColor: "#00E5FF",
                                fillOpacity: 1,
                                strokeColor: "#FFF",
                                strokeWeight: 2,
                                // Position name just above the dot
                                labelOrigin: new google.maps.Point(0, -2) 
                            }
                        });
                    }
                }
            });
        }

        function syncGuide() {
            db.ref("tour/guide").set({
                position: panorama.getPosition().toJSON(),
                pov: panorama.getPov()
            });
        }

        async function startBroadcast() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById("guide-v").srcObject = localStream;

            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) db.ref("calls/active/guideCandidates").push(e.candidate);
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref("calls/active/offer").set({ type: offer.type, sdp: offer.sdp });

            db.ref("calls/active/answer").on("value", async snap => {
                if (snap.exists() && pc.signalingState !== "stable") {
                    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                }
            });
        }

        function sendChat() {
            const input = document.getElementById("chat-input");
            if (input.value.trim()) {
                db.ref("chat").push({ sender: "GUIDE", text: input.value.toUpperCase() });
                input.value = "";
            }
        }

        db.ref("chat").on("child_added", snap => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<span style="color:#00E5FF"><b>${d.sender}:</b></span> ${d.text}`;
            const box = document.getElementById("messages");
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // Clean up on exit
        window.onbeforeunload = () => {
            db.ref("tour/guide").remove();
            db.ref("calls/active").remove();
        };
    </script>
</body>
</html>
