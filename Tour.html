<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | TOURIST VIEW</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; }
        #container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        #street-view { flex: 1; min-width: 100px; background: #111; }
        #resizer { width: 10px; background: #222; cursor: col-resize; z-index: 10; border-left: 1px solid #333; border-right: 1px solid #333; }
        #map-2d { width: 25%; min-width: 100px; background: #1a1a1a; }
        #guide-video-container {
            position: absolute; top: 20px; right: 20px; width: 260px; aspect-ratio: 16/9;
            background: #000; border: 2px solid #FFD700; border-radius: 12px;
            z-index: 1000; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #chat-container {
            position: absolute; bottom: 100px; left: 20px; width: 280px; 
            height: 220px; background: rgba(0,0,0,0.85); border-radius: 12px;
            display: flex; flex-direction: column; border: 1px solid #444; z-index: 500;
        }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input-area { display: flex; border-top: 1px solid #444; padding: 5px; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; }
        #send-btn { background: #FFD700; border: none; padding: 0 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; }
        #overlay-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 50px; border: 1px solid #FFD700;
        }
        button.ui-btn { background: #FFD700; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; }
        #status-text { font-size: 11px; font-weight: bold; color: #FFD700; min-width: 90px; text-align: center; }
    </style>
</head>
<body>

    <div id="guide-video-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message guide..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">></button>
        </div>
    </div>

    <div id="container">
        <div id="street-view"></div>
        <div id="resizer"></div>
        <div id="map-2d"></div>
    </div>

    <div id="overlay-ui">
        <span id="status-text">TETHERED</span>
        <button class="ui-btn" id="tetherBtn" onclick="toggleTether()">Untether</button>
        <button class="ui-btn" id="joinBtn" onclick="joinVideo()">START VIDEO & AUDIO</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
            authDomain: "virtual-tour-platform-492518.firebaseapp.com",
            projectId: "virtual-tour-platform-492518",
            databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
            appId: "1:1070677438051:web:503e2c36472edd11e1d256"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- CHAT CLEAR ON LOAD ---
        db.ref("chat").remove();

        let panorama, map, guideMarker, isTethered = true, pc;

        // GOOGLE MAPS LOADER
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs", v: "weekly"
        });

        async function init() {
            const { Map } = await google.maps.importLibrary("maps");
            const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
            const startPos = { lat: 40.7580, lng: -73.9855 };

            panorama = new StreetViewPanorama(document.getElementById("street-view"), {
                position: startPos, visible: true, addressControl: false, motionTracking: false, motionTrackingControl: false
            });

            map = new Map(document.getElementById("map-2d"), { center: startPos, zoom: 17, mapId: "DEMO_MAP_ID" });
            map.setStreetView(panorama);

            guideMarker = new google.maps.Marker({
                position: startPos, map: map,
                icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 7, fillColor: "#F00", fillOpacity: 1, strokeColor: "#FFF", strokeWeight: 2 }
            });

            // --- THE SNAP BACK ENGINE ---
            db.ref("tour/guide").on("value", (snap) => {
                const data = snap.val();
                if (!data || !panorama) return;

                // 1. Update 2D Marker
                guideMarker.setPosition(data.position);
                const icon = guideMarker.getIcon();
                icon.rotation = data.pov.heading;
                guideMarker.setIcon(icon);

                // 2. Forced Snap if Tethered
                if (isTethered) {
                    panorama.setPosition(data.position);
                    panorama.setPov(data.pov);
                    map.panTo(data.position);
                }
            });
        }

        function toggleTether() {
            isTethered = !isTethered;
            document.getElementById("tetherBtn").innerText = isTethered ? "Untether" : "Tether Me";
            document.getElementById("status-text").innerText = isTethered ? "TETHERED" : "ROAMING";
            
            if(isTethered) {
                db.ref("tour/guide").once("value", s => {
                    const d = s.val();
                    if(d) {
                        panorama.setPosition(d.position);
                        panorama.setPov(d.pov);
                        map.panTo(d.position);
                    }
                });
            }
        }

        // --- CHAT ENGINE ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) db.ref("chat").push({ sender: "Tourist", text: input.value });
            input.value = "";
        }

        db.ref("chat").on("child_added", (snap) => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });

        db.ref("chat").on("value", (snap) => {
            if (!snap.exists()) document.getElementById("messages").innerHTML = "";
        });

        // --- VIDEO & AUDIO ---
        async function joinVideo() {
            const vid = document.getElementById('remoteVideo');
            if (window.AudioContext || window.webkitAudioContext) {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.resume();
            }
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            pc.ontrack = (e) => {
                vid.srcObject = e.streams[0];
                vid.onloadedmetadata = () => {
                    vid.muted = false;
                    vid.volume = 1.0;
                    vid.play().catch(() => { vid.muted = true; vid.play(); });
                    document.getElementById('joinBtn').style.display = 'none';
                };
            };
            pc.onicecandidate = (e) => { if (e.candidate) db.ref("calls/active/touristCandidates").push(e.candidate.toJSON()); };
            db.ref("calls/active/guideCandidates").on("child_added", snap => {
                if (snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
            db.ref("calls/active/offer").once("value", async snap => {
                if (snap.val()) {
                    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref("calls/active/answer").set({ type: ans.type, sdp: ans.sdp });
                }
            });
        }

        // --- RESIZER ---
        const resizer = document.getElementById("resizer");
        const rightSide = document.getElementById("map-2d");
        let isResizing = false;
        resizer.addEventListener("mousedown", () => isResizing = true);
        window.addEventListener("mousemove", (e) => {
            if (!isResizing) return;
            rightSide.style.width = (window.innerWidth - e.clientX) + "px";
            if(map) google.maps.event.trigger(map, 'resize');
        });
        window.addEventListener("mouseup", () => isResizing = false);

        window.onload = init;
    </script>
</body>
</html>
